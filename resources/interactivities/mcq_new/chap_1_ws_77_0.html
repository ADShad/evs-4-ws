<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol>
              </ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [{"title": "What should you do if someone's touch makes you feel uncomfortable?", "options": ["Say 'No' and tell a trusted adult.", "Keep quiet and walk away.", "Apologise and smile.", "Ignore it and stay silent."], "correct": 0}, {"title": "Aluminium foil pressed into a tight ball sinks because it has", "options": ["More weight", "Air pocket", "High density", "Greater area"], "correct": 1}, {"title": "What feature helps desert houses store water?", "options": ["Tankas (water tanks)", "Wells", "Ponds", "Canals"], "correct": 2}, {"title": "Which festival is celebrated on the day with no Moon in the sky?", "options": ["Diwali", "Rakshabandhan", "Eid", "Pongal"], "correct": 3}, {"title": "Traditional houses in the desert are made of which materials?", "options": ["Mud and thatched roofs", "Brick and cement", "Stone and marble", "Wood and metal"], "correct": 0}];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
