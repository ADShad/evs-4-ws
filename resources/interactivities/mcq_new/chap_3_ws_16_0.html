<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol>
              </ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [{"title": "What is the state animal of Tripura?", "options": ["Bengal Tiger", "Indian Giant Squirrel", "Spectacled Monkey", "Hornbill"], "correct": 0},{"title": "Which animal's long and narrow snout helps it catch fish?", "options": ["Turtle", "Gharial", "Crocodile", "Frog"], "correct": 1}, {"title": "Which feature helps fish swim in water?", "options": ["Wings", "Shell", "Fins", "Claws"], "correct": 2}, {"title": "In the 'Web of Life' game, what do students pass around to show connections?", "options": ["A ball", "A leaf", "A ball of yarn", "A stone"], "correct": 2}, {"title": "Which of these should you NOT do in the forest according to the safety rules?", "options": ["Be careful in a new place.", "Feed animals.", "Wear comfortable shoes.", "Observe quietly."], "correct": 1}];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
