<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol></ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [
        {
          title:
            "Which factor makes a spinner remain upright and spin smoothly?",
          options: [
            "Centre hole",
            "Off-centre hole",
            "Square shape",
            "Short stick",
          ],
          correct: 0,
        },
        {
          title:
            "Aluminium foil pressed into a tight ball sinks because it has",
          options: [
            "More weight",
            "Air pocket",
            "High density",
            "Greater area",
          ],
          correct: 2,
        },
        {
          title:
            "An empty bottle with a lid floats but a filled bottle sinks because",
          options: [
            "the empty bottle is heavier.",
            "the empty bottle is denser.",
            "the empty bottle traps air.",
            "the empty bottle has more area.",
          ],
          correct: 2,
        },
        {
          title:
            "To help an object spin more steadily, you should move its mass",
          options: ["outwards", "asymmetrically", "inwards", "irregularly"],
          correct: 2,
        },
        {
          title: "When a painted spinner was spun, the colours",
          options: ["blended.", "slowed it.", "flipped it.", "sank it."],
          correct: 0,
        },
        {
          title: "A stone sinks while a leaf floats because",
          options: [
            "the leaf is lighter.",
            "the leaf has an air pocket.",
            "the leaf has more area.",
            "the leaf is waterproof.",
          ],
          correct: 2,
        },
      ];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
