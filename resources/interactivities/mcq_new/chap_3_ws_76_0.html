<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol>
              </ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [{"title": "Read the statement of Assertion (A) followed by the statement of Reason (R) and choose the correct option. (a) Assertion (A): Our body requires a variety of food items to stay healthy, energetic and strong. Reason (R): No single food contains all the nutrients our bodies need.", "options": ["(i) Both A and R are true, and R correctly explains A.", "(ii) Both A and R are true, but R does not explain A.", "(iii) A is true, but R is false.", "(iv) A is false, but R is true."], "correct": 0}, {"title": "Read the statement of Assertion (A) followed by the statement of Reason (R) and choose the correct option. (b) Assertion (A): Fish have fins to swim. Reason (R): Fish have webbed feet to help them swim easily.", "options": ["(i) Both A and R are true, and R correctly explains A.", "(ii) Both A and R are true, but R does not explain A.", "(iii) A is true, but R is false.", "(iv) A is false, but R is true."], "correct": 0}];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
