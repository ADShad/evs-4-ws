<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multiple Choice Questions</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="mcq-section">
        <ol>
          <li>
            <h3>Choose the correct option.</h3>
            <div class="quiz_ques">
              <ol></ol>
            </div>
          </li>
        </ol>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="score" style="display: none">
        Score: <span id="total-score">0</span>/<span id="total-marks">0</span>
      </div>
      <div class="buttons">
        <button type="button" id="btn-submit" class="btn btn-submit">
          Submit
        </button>
        <button type="button" id="btn-reset" class="btn btn-reset">
          Reset
        </button>
      </div>
      <audio controls id="audio-intro" class="hide">
        <source src="./audio/main.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-try-again">
        <source src="../../audio/try-again.mp3" type="audio/mp3" />
      </audio>
      <audio id="audio-clap">
        <source src="../../audio/welldone.mp3" type="audio/mp3" />
      </audio>
    </div>

    <script type="text/javascript">
      const questions = [
        {
          title: "Paper is made from",
          options: ["Trees", "Water", "Fenugreek seeds", "Newspaper"],
          correct: 0,
        },
        {
          title: "Fenugreek seeds are used as a",
          options: [
            "Binding material",
            "Colouring ingredient",
            "Cleaning tool",
            "Drying agent",
          ],
          correct: 0,
        },
        {
          title: "After blending the pulp, spread the paste on a",
          options: ["Flat base", "Tree", "Pot", "Cloth"],
          correct: 3,
        },
        {
          title: "Natural dyes are made from different parts of a",
          options: ["Plant", "Paper", "Pot", "Seed"],
          correct: 0,
        },
        {
          title: "Cardboard is .................... and hard.",
          options: ["Thick", "Bright", "Soft", "Thin"],
          correct: 0,
        },
        {
          title: "The first 'R' in the 5Rs stands for",
          options: ["Refuse", "Reduce", "Reuse", "Recycle"],
          correct: 0,
        },
      ];
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
