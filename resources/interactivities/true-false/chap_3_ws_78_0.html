<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>True or False Activity</title>
    <link rel="stylesheet" href="css/true-false.css" />
  </head>
  <body>
    <div class="container">
      <div class="question">
        <h3>Write True or False for the following statements.</h3>
      </div>
      <div id="statements-container"></div>
      <div class="feedback" id="feedback"></div>
      <div class="score-display" id="score-display"></div>
      <div class="buttons">
        <button class="btn btn-submit" onclick="checkAnswers()" id="btn-submit">
          Submit
        </button>
        <button
          class="hide btn btn-submit"
          style="margin: 0 auto"
          onclick="showAns()"
          id="showAns"
        >
          Show Answers
        </button>
        <button class="btn btn-reset" onclick="resetQuiz()">Reset</button>
      </div>
    </div>

    <audio controls id="audio-intro" class="hide">
      <source src="./audio/main.mp3" type="audio/mp3" />
    </audio>
    <audio id="audio-try-again">
      <source src="../../audio/try-again.mp3" type="audio/mp3" />
    </audio>
    <audio id="audio-clap">
      <source src="../../audio/welldone.mp3" type="audio/mp3" />
    </audio>

    <script src="js/true-false.js"></script>
    <script>
      const statements = [{"text": "A good sleep takes away our tiredness and makes us feel fresh.", "answer": "True"}, {"text": "Aluminium foil always sinks regardless of its shape.", "answer": "False"}, {"text": "Refuse means saying 'No' to using things that generate waste.", "answer": "True"}, {"text": "Mountains rarely experience landslides during the rainy season.", "answer": "False"}, {"text": "The Moon appears to be the biggest object in the night sky.", "answer": "True"}];

      window.addEventListener("load", () => initializeQuiz(statements));
    </script>
  </body>
</html>
